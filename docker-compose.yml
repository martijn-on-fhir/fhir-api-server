services:
  fhir-api:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/fhir?replicaSet=rs0
      - PORT=3000
      - LOG_FORMAT=json
      - CORS_ORIGIN=${CORS_ORIGIN:?Set CORS_ORIGIN to allowed origins (e.g. https://app.example.com)}
      - BODY_SIZE_LIMIT=${BODY_SIZE_LIMIT:-5mb}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-30000}
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - RATE_LIMIT_DISABLED=${RATE_LIMIT_DISABLED:-false}
    volumes:
      - ./file-import:/app/file-import:ro
      - backups:/app/backups
    depends_on:
      mongo:
        condition: service_healthy
      otel-collector:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mongo:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: >
        mongosh --eval "
          try { rs.status().ok } catch(e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] }); sleep(2000); rs.status().ok }
        "
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./config/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"
    depends_on:
      - jaeger
      - prometheus
    restart: unless-stopped

  jaeger:
    image: jaegertracing/jaeger:latest
    volumes:
      - ./config/jaeger.yaml:/etc/jaeger/config.yaml:ro
    command: ["--config", "/etc/jaeger/config.yaml"]
    ports:
      - "16686:16686"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  mongodb-exporter:
    image: percona/mongodb_exporter:0.43
    ports:
      - "9216:9216"
    environment:
      - MONGODB_URI=mongodb://mongo:27017
    command: ["--collect-all", "--compatible-mode"]
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./config/promtail.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_UNIFIED_ALERTING_ENABLED=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docs/grafana-dashboard.json:/var/lib/grafana/dashboards/fhir-api-server.json:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  mongo-data:
  prometheus-data:
  grafana-data:
  loki-data:
  backups:
