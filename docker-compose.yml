services:
  fhir-api:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/fhir
      - PORT=3000
      - LOG_FORMAT=json
    volumes:
      - ./file-import:/app/file-import:ro
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mongo:
    image: mongo:7
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
