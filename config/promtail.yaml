server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Only scrape containers from this compose project
      - source_labels: [__meta_docker_container_name]
        regex: .*fhir-api.*|.*mongo.*
        action: keep
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
    pipeline_stages:
      # Try to parse JSON logs (fhir-api structured logging)
      - json:
          expressions:
            level: level
            context: context
            correlationId: correlationId
            method: method
            url: url
            status: status
      - labels:
          level:
          context:
