global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: fhir-api
    metrics_path: /metrics
    static_configs:
      - targets: [fhir-api:3000]

  - job_name: mongodb
    static_configs:
      - targets: [mongodb-exporter:9216]

  - job_name: otel-collector-spanmetrics
    static_configs:
      - targets: [otel-collector:8889]
