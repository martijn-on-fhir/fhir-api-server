version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      opentelemetry:
        patterns:
          - "@opentelemetry/*"
      testing:
        patterns:
          - jest
          - ts-jest
          - "@types/jest"
          - supertest

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - ci
